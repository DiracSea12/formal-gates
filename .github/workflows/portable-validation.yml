name: Portable Validation

on:
  push:
  pull_request:

jobs:
  go-validation:
    name: Go validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run Go tests
        run: go test ./...
      - name: Validate package
        run: go run ./cmd/formal-gates-validate package --root .
