name: Portable Validation

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

# Release assets:
# - formal-gates-windows-amd64.exe, portable-canary-windows-amd64.json, SHA256SUMS-windows-amd64.txt
# - formal-gates-macos-arm64, portable-canary-macos-arm64.json, SHA256SUMS-macos-arm64.txt
# - formal-gates-macos-amd64, portable-canary-macos-amd64.json, SHA256SUMS-macos-amd64.txt
# - formal-gates-linux-amd64, portable-canary-linux-amd64.json, SHA256SUMS-linux-amd64.txt

jobs:
  go-validation:
    name: Go validation (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows-amd64
            binary: formal-gates-windows-amd64.exe
          - os: macos-15
            suffix: macos-arm64
            binary: formal-gates-macos-arm64
          - os: macos-15-intel
            suffix: macos-amd64
            binary: formal-gates-macos-amd64
          - os: ubuntu-latest
            suffix: linux-amd64
            binary: formal-gates-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build native CLI (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist bin mkdir bin
          go build -o bin\formal-gates.exe ./cmd/formal-gates
      - name: Build native CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p bin
          go build -o bin/formal-gates ./cmd/formal-gates
      - name: Run Go tests
        run: go test ./...
      - name: Validate package (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          bin\formal-gates.exe package validate --root .
      - name: Validate package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin/formal-gates package validate --root .
      - name: Run native portable canary (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          bin\formal-gates.exe canary portable --root . --format json > portable-canary.json
      - name: Validate behavior answer fixture (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          bin\formal-gates.exe behavior evaluate --root . --cases examples\skill-behavior-prompts.json --answers examples\skill-behavior-answers.json
      - name: Run native portable canary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin/formal-gates canary portable --root . --format json > portable-canary.json
      - name: Validate behavior answer fixture (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin/formal-gates behavior evaluate --root . --cases examples/skill-behavior-prompts.json --answers examples/skill-behavior-answers.json
      - name: Prepare release evidence names (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item bin/formal-gates.exe ${{ matrix.binary }}
          Copy-Item portable-canary.json portable-canary-${{ matrix.suffix }}.json
      - name: Prepare release evidence names (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp bin/formal-gates "${{ matrix.binary }}"
          cp portable-canary.json "portable-canary-${{ matrix.suffix }}.json"
      - name: Write release checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 ${{ matrix.binary }} | ForEach-Object { "$($_.Hash.ToLower())  ${{ matrix.binary }}" } > SHA256SUMS-${{ matrix.suffix }}.txt
          Get-FileHash -Algorithm SHA256 portable-canary-${{ matrix.suffix }}.json | ForEach-Object { "$($_.Hash.ToLower())  portable-canary-${{ matrix.suffix }}.json" } >> SHA256SUMS-${{ matrix.suffix }}.txt
      - name: Write release checksums (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shasum -a 256 "${{ matrix.binary }}" "portable-canary-${{ matrix.suffix }}.json" > "SHA256SUMS-${{ matrix.suffix }}.txt"
      - name: Write CI checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item SHA256SUMS-${{ matrix.suffix }}.txt SHA256SUMS
      - name: Write CI checksums (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "SHA256SUMS-${{ matrix.suffix }}.txt" SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: formal-gates-${{ matrix.suffix }}
          path: |
            formal-gates-*
            portable-canary-*.json
            SHA256SUMS*.txt

  release-evidence:
    name: Upload release evidence (${{ matrix.suffix }})
    if: github.event_name == 'release'
    needs: go-validation
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows-amd64
            binary: formal-gates-windows-amd64.exe
          - os: macos-15
            suffix: macos-arm64
            binary: formal-gates-macos-arm64
          - os: macos-15-intel
            suffix: macos-amd64
            binary: formal-gates-macos-amd64
          - os: ubuntu-latest
            suffix: linux-amd64
            binary: formal-gates-linux-amd64
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: formal-gates-${{ matrix.suffix }}
      - name: Upload release evidence (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload $env:GITHUB_REF_NAME ${{ matrix.binary }} portable-canary-${{ matrix.suffix }}.json SHA256SUMS-${{ matrix.suffix }}.txt --clobber --repo $env:GITHUB_REPOSITORY
      - name: Upload release evidence (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" "${{ matrix.binary }}" "portable-canary-${{ matrix.suffix }}.json" "SHA256SUMS-${{ matrix.suffix }}.txt" --clobber --repo "$GITHUB_REPOSITORY"
